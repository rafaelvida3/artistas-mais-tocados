name: Deploy MU Plugins

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

      - name: Deploy MU plugins with rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete --exclude='.git' --exclude='simba-tfa-encryption-key.php' --exclude='disable-aios.php'
          path: wp-content/mu-plugins/
          remote_path: ~/domains/artistasmaistocados.com.br/public_html/wp-content/mu-plugins/
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_user: ${{ secrets.HOSTINGER_USERNAME }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}